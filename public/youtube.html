<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>Melopal YouTube Player</title>
<style>
  html,
  body {
    width: 100%;
    height: 100%;
    margin: 0;
    overflow: hidden;
    background: #000;
  }

  body {
    display: grid;
    place-items: center;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
    background: #000;
  }

  .error {
    max-width: 32rem;
    padding: 1.5rem;
    text-align: center;
    line-height: 1.5;
  }
</style>
</head>
<body>
<script>
(function () {
  "use strict";

  var supportedCommands = {
    setPlaybackRate: true,
    playVideo: true,
    pauseVideo: true,
    stopVideo: true
  };

  var params = new URLSearchParams(window.location.search);
  var videoId = cleanVideoId(params.get("v"));

  if (!videoId) {
    showError("Missing YouTube video ID.");
    return;
  }

  var youtubeParams = new URLSearchParams();
  youtubeParams.set("enablejsapi", "1");
  youtubeParams.set("origin", window.location.origin);
  youtubeParams.set("playsinline", valueOrDefault(params.get("playsinline"), "1"));
  youtubeParams.set("controls", valueOrDefault(params.get("controls"), "1"));
  youtubeParams.set("rel", valueOrDefault(params.get("rel"), "0"));

  copyOptionalParam(params, youtubeParams, "autoplay");

  if (params.get("mute") === "1") {
    youtubeParams.set("mute", "1");
  }

  if (params.get("loop") === "1") {
    youtubeParams.set("loop", "1");
    youtubeParams.set("playlist", cleanPlaylist(params.get("playlist")) || videoId);
  } else {
    copyOptionalParam(params, youtubeParams, "playlist", cleanPlaylist);
  }

  var iframe = document.createElement("iframe");
  iframe.src = "https://www.youtube-nocookie.com/embed/" + encodeURIComponent(videoId) + "?" + youtubeParams.toString();
  iframe.title = "YouTube video player";
  iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share";
  iframe.allowFullscreen = true;
  iframe.referrerPolicy = "strict-origin-when-cross-origin";
  document.body.appendChild(iframe);

  window.addEventListener("message", function (event) {
    var data = event.data;

    if (!data || typeof data !== "object" || Array.isArray(data)) return;
    if (data.type !== "melopal-youtube-command") return;
    if (typeof data.func !== "string" || !supportedCommands[data.func]) return;

    var args = Array.isArray(data.args) ? data.args : [];
    iframe.contentWindow.postMessage(JSON.stringify({
      event: "command",
      func: data.func,
      args: args
    }), "https://www.youtube-nocookie.com");
  });

  function valueOrDefault(value, fallback) {
    return value === null || value === "" ? fallback : value;
  }

  function copyOptionalParam(from, to, name, cleaner) {
    var value = from.get(name);
    if (value === null || value === "") return;
    to.set(name, cleaner ? cleaner(value) : value);
  }

  function cleanVideoId(value) {
    value = String(value || "").trim();
    return /^[A-Za-z0-9_-]{6,20}$/.test(value) ? value : "";
  }

  function cleanPlaylist(value) {
    return String(value || "")
      .split(",")
      .map(cleanVideoId)
      .filter(Boolean)
      .join(",");
  }

  function showError(message) {
    var error = document.createElement("div");
    error.className = "error";
    error.textContent = message;
    document.body.appendChild(error);
  }
})();
</script>
</body>
</html>
